<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>像素飞行</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Courier New', monospace;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 100vw;
    max-height: 100vh;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 6px solid #333;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(255,200,100,0.3);
    /* 宽度由 JS 动态设置 */
  }
  #info {
    text-align: center;
    color: #8f8faa;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 8px 0;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="info">PIXEL FLIGHT · 点击屏幕暂停</div>
</div>
<script>
(function() {
  const W = 256, H = 160;   // 内部像素分辨率 16:10 更适合手机横屏
  const canvas = document.getElementById('c');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  let t = 0, paused = false, planeX = 90, planeY = 60;

  // ── 自适应缩放 ──
  function resize() {
    const maxW = window.innerWidth - 16;    // 留边距
    const maxH = window.innerHeight - 50;   // 留空间给底部文字
    const scaleW = Math.floor(maxW / W);
    const scaleH = Math.floor(maxH / H);
    const scale = Math.min(scaleW, scaleH, 5); // 最大 5 倍，最小 1 倍
    canvas.style.width  = (W * Math.max(scale, 2)) + 'px';
    canvas.style.height = (H * Math.max(scale, 2)) + 'px';
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));
  resize();

  // ── 调色板 ──
  const C = {
    skyT: '#9bbcfa', skyB: '#c4d9ff',
    sun: '#f8e840', sunR: '#f0c820',
    cloud1:'#ffffff', cloud2:'#e0e8ff', cloud3:'#c8d4f0',
    ground:'#5a9e4b', groundD:'#3d7a30', groundL:'#7cc464',
    body:'#e84040', bodyD:'#b82828', bodyL:'#ff6060',
    wing:'#f8c840', wingD:'#c89820',
    glass:'#60d0f8', glassS:'#a0e8ff',
    prop:'#8b5e3c', propD:'#5a3820',
    kidH:'#f8d098', kidS:'#e0b878', kidE:'#404040',
    stripe:'#ffffff',
  };

  function rect(x,y,w,h,c) { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
  function px(x,y,c) { ctx.fillStyle=c; ctx.fillRect(x,y,1,1); }

  function lerpColor(a,b,t) {
    const ah=parseInt(a.slice(1),16), bh=parseInt(b.slice(1),16);
    const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
    const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
    const rr=Math.round(ar+(br-ar)*t), rg=Math.round(ag+(bg-ag)*t), rb=Math.round(ab+(bb-ab)*t);
    return '#'+((1<<24)|(rr<<16)|(rg<<8)|rb).toString(16).slice(1);
  }

  // ── 天空 ──
  function drawSky() {
    for (let y=0; y<106; y++) {
      const r = y/106;
      rect(0,y,W,1,lerpColor(C.skyB, C.skyT, r));
    }
  }

  // ── 太阳 ──
  function drawSun(cx,cy,r) {
    for (let y=-r; y<=r; y++) {
      for (let x=-r; x<=r; x++) {
        if (x*x+y*y <= r*r+2) {
          px(cx+x,cy+y, Math.sqrt(x*x+y*y)/r > 0.8 ? C.sunR : C.sun);
        }
      }
    }
    for (let i=0; i<12; i++) {
      const a = (i/12)*Math.PI*2 + t*0.003;
      const sx = cx + Math.cos(a)*(r+2);
      const sy = cy + Math.sin(a)*(r+2);
      for (let j=0; j<4; j++) {
        px(Math.round(sx+Math.cos(a)*j), Math.round(sy+Math.sin(a)*j), j%2===0 ? C.sun : C.sunR);
      }
    }
  }

  // ── 像素云 ──
  function getCloud(ox,oy,s) {
    const cells = [];
    const blob = [[0,0,5,3],[1,-1,7,2],[2,-2,4,2],[3,0,6,2],[5,-1,4,2]];
    for (const [bx,by,bw,bh] of blob) {
      for (let y=0; y<bh; y++)
        for (let x=0; x<bw; x++)
          cells.push([bx+x-(s>>1), by+y-(s>>1)]);
    }
    const seen = {}, uniq = [];
    for (const [x,y] of cells) { const k = x+','+y; if (!seen[k]) { seen[k]=true; uniq.push([x,y]); } }
    return { cells:uniq, ox, oy, s };
  }

  const clouds = [];
  for (let i=0; i<5; i++) {
    clouds.push(getCloud(Math.random()*280-20, 6+Math.random()*60, 14+Math.random()*20));
  }

  function drawClouds() {
    for (const cl of clouds) {
      let cx = cl.ox - (t*0.4)%(W+60) + 30;
      if (cx < -40) cx += W+80;
      const cy = cl.oy + Math.sin(t*0.008+cl.ox)*2;
      for (const [x,y] of cl.cells) {
        const px2 = Math.round(cx+x), py2 = Math.round(cy+y);
        if (px2>=0 && px2<W && py2>=0 && py2<H) {
          px(px2, py2, y<0 ? C.cloud1 : ((x+y)%3===0 ? C.cloud2 : C.cloud1));
        }
      }
    }
  }

  // ── 地面 ──
  function drawGround() {
    rect(0,120,W,40,C.ground);
    for (let x=0; x<W; x+=3)
      for (let y=120; y<H; y+=3) {
        if ((x+y)%5===0) px(x,y,C.groundD);
        if ((x+y)%7===0) px(x+1,y+1,C.groundL);
      }
    for (let x=0; x<W; x+=2) {
      const h = 2+Math.abs(Math.sin(x*0.3+t*0.02))*3;
      for (let j=0; j<h; j++)
        px(Math.round(x), 120-Math.round(j), j===0 ? C.groundL : C.ground);
    }
  }

  // ── 辅助 ──
  function rect8(x,y,w,h,ck) {
    const a=[];
    for (let dy=0; dy<h; dy++)
      for (let dx=0; dx<w; dx++) a.push([x+dx, y+dy, ck]);
    return a;
  }
  function line8(x1,y1,x2,y2,ck) {
    const a=[], dx=x2-x1, dy=y2-y1, s=Math.max(Math.abs(dx),Math.abs(dy));
    for (let i=0; i<=s; i++) a.push([Math.round(x1+dx*i/s), Math.round(y1+dy*i/s), ck]);
    return a;
  }
  function px8(x,y,ck) { return [[x,y,ck]]; }

  function propeller(cx,cy,tick) {
    const a = tick*0.6, r = 8, pts = [];
    for (let b=0; b<2; b++) {
      const aa = a + b*Math.PI;
      for (let j=0; j<=r; j++) {
        const ppx = cx + Math.cos(aa)*j, ppy = cy + Math.sin(aa)*j;
        pts.push([Math.round(ppx), Math.round(ppy), 'prop']);
        if (j===r) pts.push([Math.round(ppx+Math.cos(aa)), Math.round(ppy+Math.sin(aa)), 'propD']);
      }
    }
    pts.push([cx,cy,'propD']);
    return pts;
  }

  // ── 飞机 ──
  function drawPlane(ox,oy) {
    const sprite = [
      ...rect8(0,6, 28,10, 'body'),
      ...rect8(1,6, 26,3, 'bodyL'),
      ...rect8(0,14, 28,2, 'bodyD'),
      ...rect8(28,7, 8,8, 'bodyL'),
      ...line8(36,7, 40,11, 'bodyL'),
      ...line8(36,14, 40,11, 'bodyD'),
      ...rect8(38,8, 4,6, 'body'),
      ...rect8(0,2, 6,4, 'bodyL'),
      ...rect8(0,0, 3,2, 'body'),
      ...rect8(4,0, 3,6, 'wing'),
      ...rect8(8,9, 18,2, 'stripe'),
      ...rect8(10,3, 14,3, 'wing'),
      ...rect8(12,1, 10,2, 'wing'),
      ...rect8(10,5, 14,1, 'wingD'),
      ...rect8(26,8, 10,5, 'glass'),
      ...line8(27,8, 32,8, 'glassS'),
      px8(28,9, 'glassS'), px8(30,9, 'glassS'),
      ...rect8(30,9, 4,4, 'kidH'),
      ...rect8(30,8, 3,1, 'kidE'), px8(29,9, 'kidE'),
      px8(31,10, 'kidE'), px8(33,10, 'kidE'),
      px8(31,12, 'kidE'), px8(33,12, 'kidE'),
      ...propeller(2, 11, t),
      ...rect8(16,16, 2,3, 'propD'), ...rect8(22,16, 2,3, 'propD'),
      ...rect8(14,19, 4,3, 'prop'), ...rect8(22,19, 4,3, 'prop'),
    ];
    for (const [sx,sy,ck] of sprite) {
      px(Math.round(ox+sx), Math.round(oy+sy), C[ck] || '#fff');
    }
    // 尾气
    for (let i=0; i<3; i++) {
      const ex = ox - 4 - i*3 - (t%6);
      const ey = oy + 11 + Math.sin(t*0.3+i)*1;
      if (ex>0 && ex<W) px(Math.round(ex), Math.round(ey), i===0 ? '#ffffff' : '#d0d0e0');
    }
  }

  // ── 像素鸟 ──
  function drawBirds() {
    const birds = [[170,42],[205,30],[185,50]];
    for (const [bx,by] of birds) {
      const frame = Math.floor(t/20)%3;
      const wx = bx + Math.sin(t*0.01+bx)*10;
      const wy = by + Math.cos(t*0.015+by)*4;
      if (frame===0) { px(Math.round(wx),Math.round(wy),C.propD); px(Math.round(wx+2),Math.round(wy-1),C.propD); }
      else if (frame===1) { px(Math.round(wx+2),Math.round(wy),C.propD); px(Math.round(wx),Math.round(wy-1),C.propD); }
      else { px(Math.round(wx+1),Math.round(wy),C.propD); px(Math.round(wx+1),Math.round(wy-1),C.propD); }
    }
  }

  // ── 标题 ──
  function drawTitle() {
    ctx.fillStyle = '#2a2040';
    ctx.font = '7px "Courier New"';
    ctx.fillText('PIXEL', 6, 16);
    ctx.fillText('FLIGHT', 4, 24);
  }

  // ── 主循环 ──
  function frame() {
    if (!paused) t++;
    planeX = 85 + Math.sin(t*0.012)*55 + Math.sin(t*0.023)*15;
    planeY = 48 + Math.cos(t*0.017)*16 + Math.sin(t*0.031)*6;

    drawSky();
    drawSun(220, 28, 16);
    drawClouds();
    drawBirds();
    drawGround();
    drawPlane(planeX, planeY);
    drawTitle();

    requestAnimationFrame(frame);
  }

  // ── 交互 ──
  document.addEventListener('keydown', () => { paused = !paused; });
  canvas.addEventListener('click', (e) => { e.preventDefault(); paused = !paused; });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); paused = !paused; });

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
